# Lean 4 project configuration for Form.Normalizer

name = "FormNormalizer"
version = "0.0.4"
defaultTargets = ["FormNormalizer"]

[[lean_lib]]
name = "FormNormalizer"
roots = ["FunDep", "Bridge", "Proofs"]

[[lean_exe]]
name = "tests"
root = "Tests"

