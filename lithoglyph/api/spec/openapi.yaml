# SPDX-License-Identifier: PMPL-1.0-or-later
# Lith REST API - OpenAPI 3.1 Specification

openapi: 3.1.0
info:
  title: Lith API
  description: |
    Narrative-first, reversible, audit-grade database API.

    All operations support provenance tracking via the `X-Provenance-Actor`
    and `X-Provenance-Rationale` headers.
  version: 0.0.4
  license:
    name: PMPL-1.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: hyperpolymath
    url: https://github.com/hyperpolymath/lith

servers:
  - url: http://localhost:8080/v1
    description: Local development
  - url: https://api.lith.example.com/v1
    description: Production

tags:
  - name: Query
    description: GQL query execution
  - name: Collections
    description: Collection management
  - name: Journal
    description: Audit journal access
  - name: Normalizer
    description: Self-normalizing operations
  - name: Migration
    description: Schema migration operations
  - name: Health
    description: Health and metrics
  - name: Bofig Ingest
    description: Bofig evidence ingest from Docudactyl Cap'n Proto payloads

paths:
  /query:
    post:
      tags: [Query]
      summary: Execute GQL query
      description: |
        Execute any GQL statement (SELECT, INSERT, UPDATE, DELETE, etc.)
        with optional provenance tracking.
      operationId: executeQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Query executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          description: Invalid GQL syntax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Execution error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collections:
    get:
      tags: [Collections]
      summary: List all collections
      operationId: listCollections
      responses:
        '200':
          description: List of collections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionList'
    post:
      tags: [Collections]
      summary: Create a new collection
      operationId: createCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
      responses:
        '201':
          description: Collection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '409':
          description: Collection already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collections/{name}:
    get:
      tags: [Collections]
      summary: Get collection schema
      operationId: getCollection
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Collection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Collections]
      summary: Drop collection
      operationId: dropCollection
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Collection dropped
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /journal:
    get:
      tags: [Journal]
      summary: Query journal entries
      operationId: getJournal
      parameters:
        - name: since
          in: query
          description: Sequence number to start from
          schema:
            type: integer
            minimum: 0
        - name: limit
          in: query
          description: Maximum entries to return
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: collection
          in: query
          description: Filter by collection name
          schema:
            type: string
        - name: actor
          in: query
          description: Filter by actor ID
          schema:
            type: string
      responses:
        '200':
          description: Journal entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalResponse'

  /normalize/discover:
    post:
      tags: [Normalizer]
      summary: Discover functional dependencies
      operationId: discoverDependencies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverRequest'
      responses:
        '200':
          description: Discovered dependencies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverResponse'

  /normalize/analyze:
    post:
      tags: [Normalizer]
      summary: Analyze normal form
      operationId: analyzeNormalForm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        '200':
          description: Normal form analysis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'

  /migrate/start:
    post:
      tags: [Migration]
      summary: Start a migration
      operationId: startMigration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrationStartRequest'
      responses:
        '200':
          description: Migration started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationResponse'

  /migrate/{id}/shadow:
    post:
      tags: [Migration]
      summary: Advance migration to shadow phase
      operationId: advanceToShadow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Advanced to shadow phase
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationResponse'

  /migrate/{id}/commit:
    post:
      tags: [Migration]
      summary: Commit migration
      operationId: commitMigration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Migration committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationResponse'

  /migrate/{id}/abort:
    post:
      tags: [Migration]
      summary: Abort migration
      operationId: abortMigration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Migration aborted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MigrationResponse'

  /bofig/ingest:
    post:
      tags: [Bofig Ingest]
      summary: Ingest a single evidence record
      description: |
        Ingest a single evidence record into the Bofig collections.
        Accepts evidence with optional embedded entities, financial
        transactions, and claims. Deduplication by SHA-256 hash.
      operationId: ingestEvidence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestEvidenceRequest'
      responses:
        '200':
          description: Evidence ingested successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResult'
        '400':
          description: Invalid evidence record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Duplicate evidence (SHA-256 hash already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Ingest error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bofig/batch-ingest:
    post:
      tags: [Bofig Ingest]
      summary: Batch ingest evidence records
      description: |
        Batch ingest multiple evidence records with shared provenance.
        Supports deduplication by SHA-256 hash and continue-on-error
        semantics. Returns per-record results with imported/skipped/failed
        counts.
      operationId: batchIngestEvidence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchIngestRequest'
      responses:
        '200':
          description: Batch ingest completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestResult'
        '400':
          description: Invalid batch request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Batch ingest error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bofig/ingest/{runId}/status:
    get:
      tags: [Bofig Ingest]
      summary: Get ingest run status
      description: |
        Get the progress and status of a batch ingest run.
      operationId: getIngestStatus
      parameters:
        - name: runId
          in: path
          required: true
          description: Batch ingest run identifier
          schema:
            type: string
      responses:
        '200':
          description: Ingest run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestProgress'
        '404':
          description: Ingest run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      operationId: getMetrics
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

components:
  schemas:
    QueryRequest:
      type: object
      required: [gql]
      properties:
        gql:
          type: string
          description: GQL statement to execute
          example: "SELECT * FROM articles WHERE status = 'published' LIMIT 10"
        provenance:
          $ref: '#/components/schemas/Provenance'
        explain:
          type: boolean
          description: Return query plan instead of executing
          default: false
        analyze:
          type: boolean
          description: Execute and return timing information
          default: false
        verbose:
          type: boolean
          description: Include verbose output
          default: false

    QueryResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        rowCount:
          type: integer
        journalSeq:
          type: integer
          description: Journal sequence number for this operation
        plan:
          $ref: '#/components/schemas/QueryPlan'
        timing:
          $ref: '#/components/schemas/Timing'

    QueryPlan:
      type: object
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PlanStep'
        estimatedCost:
          type: number
        rationale:
          type: string

    PlanStep:
      type: object
      properties:
        type:
          type: string
          enum: [scan, filter, project, limit, traverse, insert, update, delete]
        collection:
          type: string
        details:
          type: object
          additionalProperties: true

    Timing:
      type: object
      properties:
        parseMs:
          type: number
        planMs:
          type: number
        executeMs:
          type: number
        totalMs:
          type: number

    Provenance:
      type: object
      properties:
        actor:
          type: string
          description: Actor identifier (user, system, agent)
          example: "editor@news.org"
        rationale:
          type: string
          description: Human-readable reason for the operation
          example: "Daily content review"

    Collection:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [document, edge]
        schema:
          $ref: '#/components/schemas/Schema'
        documentCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        normalForm:
          type: string
          enum: [1NF, 2NF, 3NF, BCNF, unknown]

    Schema:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/Field'
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/Constraint'

    Field:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, integer, float, boolean, date, datetime, json, blob]
        nullable:
          type: boolean
          default: true

    Constraint:
      type: object
      properties:
        type:
          type: string
          enum: [primary_key, unique, foreign_key, check, functional_dependency]
        fields:
          type: array
          items:
            type: string
        expression:
          type: string

    CollectionList:
      type: object
      properties:
        collections:
          type: array
          items:
            $ref: '#/components/schemas/Collection'
        total:
          type: integer

    CreateCollectionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [document, edge]
          default: document
        schema:
          $ref: '#/components/schemas/Schema'
        provenance:
          $ref: '#/components/schemas/Provenance'

    JournalEntry:
      type: object
      properties:
        seq:
          type: integer
          description: Sequence number
        timestamp:
          type: string
          format: date-time
        operation:
          type: string
          enum: [insert, update, delete, create_collection, drop_collection, migration]
        collection:
          type: string
        documentId:
          type: string
        before:
          type: object
          additionalProperties: true
        after:
          type: object
          additionalProperties: true
        provenance:
          $ref: '#/components/schemas/Provenance'
        inverse:
          type: string
          description: GQL statement to reverse this operation

    JournalResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/JournalEntry'
        hasMore:
          type: boolean
        nextSeq:
          type: integer

    DiscoverRequest:
      type: object
      required: [collection]
      properties:
        collection:
          type: string
        sampleSize:
          type: integer
          default: 1000
        confidenceThreshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.95

    DiscoverResponse:
      type: object
      properties:
        collection:
          type: string
        functionalDependencies:
          type: array
          items:
            $ref: '#/components/schemas/FunctionalDependency'
        candidateKeys:
          type: array
          items:
            type: array
            items:
              type: string

    FunctionalDependency:
      type: object
      properties:
        determinant:
          type: array
          items:
            type: string
        dependent:
          type: string
        confidence:
          type: number
        tier:
          type: string
          enum: [high, medium, low]

    AnalyzeRequest:
      type: object
      required: [collection]
      properties:
        collection:
          type: string

    AnalyzeResponse:
      type: object
      properties:
        collection:
          type: string
        currentForm:
          type: string
          enum: [1NF, 2NF, 3NF, BCNF]
        violations:
          type: array
          items:
            $ref: '#/components/schemas/Violation'
        recommendations:
          type: array
          items:
            $ref: '#/components/schemas/Recommendation'

    Violation:
      type: object
      properties:
        type:
          type: string
          enum: [partial_dependency, transitive_dependency, bcnf_violation]
        description:
          type: string
        affectedFields:
          type: array
          items:
            type: string

    Recommendation:
      type: object
      properties:
        action:
          type: string
          enum: [decompose, add_constraint, denormalize]
        description:
          type: string
        targetForm:
          type: string
        migrationSteps:
          type: array
          items:
            type: string

    MigrationStartRequest:
      type: object
      required: [collection, targetForm]
      properties:
        collection:
          type: string
        targetForm:
          type: string
          enum: [2NF, 3NF, BCNF]
        provenance:
          $ref: '#/components/schemas/Provenance'

    MigrationResponse:
      type: object
      properties:
        id:
          type: string
        collection:
          type: string
        phase:
          type: string
          enum: [announce, shadow, commit, aborted, complete]
        startedAt:
          type: string
          format: date-time
        narrative:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        uptime:
          type: integer
          description: Uptime in seconds
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [pass, fail]

    IngestEvidenceRequest:
      type: object
      required: [investigationId, title, evidenceType, sha256Hash, provenance]
      properties:
        investigationId:
          type: string
          description: Investigation this evidence belongs to
        title:
          type: string
          description: Human-readable title for the evidence
        evidenceType:
          type: string
          enum: [court_filing, deposition, testimony, flight_log, financial_record, communication, photograph, video, official_statistics, news_report, document, dataset, interview, affidavit, subpoena, other]
        contentText:
          type: string
          description: Extracted text content (OCR'd if from scanned document)
        urlSource:
          type: string
          description: URL or file path to original source document
        sha256Hash:
          type: string
          description: SHA-256 hash for deduplication and integrity verification
        perceptualHash:
          type: string
          description: Perceptual hash for near-duplicate image detection
        ocrConfidence:
          type: integer
          minimum: 0
          maximum: 100
          description: Tesseract OCR confidence score
        language:
          type: string
          description: ISO 639-1 language code
        documentDate:
          type: string
          format: date-time
          description: Date of the original document
        entitiesExtracted:
          type: array
          items:
            type: string
          description: NER-extracted entity names
        keywords:
          type: array
          items:
            type: string
          description: Auto-extracted keywords
        redactionStatus:
          type: string
          enum: [clean, redacted, partially_recovered, fully_recovered, not_applicable]
        redactionCount:
          type: integer
          minimum: 0
        extractionRunId:
          type: string
          description: Docudactyl pipeline run identifier
        dublinCoreMetadata:
          type: object
          additionalProperties: true
          description: Dublin Core metadata
        sensitivityLevel:
          type: string
          enum: [public, restricted, sealed, source_protected]
        promptScores:
          $ref: '#/components/schemas/PromptScoresInput'
        notes:
          type: string
        entities:
          type: array
          items:
            $ref: '#/components/schemas/IngestEntityInput'
        financialTransactions:
          type: array
          items:
            $ref: '#/components/schemas/IngestFinancialTransactionInput'
        claims:
          type: array
          items:
            $ref: '#/components/schemas/IngestClaimInput'
        provenance:
          $ref: '#/components/schemas/Provenance'

    PromptScoresInput:
      type: object
      required: [provenance, replicability, objectivity, methodology, publication, timeliness]
      properties:
        provenance:
          type: integer
          minimum: 0
          maximum: 100
        replicability:
          type: integer
          minimum: 0
          maximum: 100
        objectivity:
          type: integer
          minimum: 0
          maximum: 100
        methodology:
          type: integer
          minimum: 0
          maximum: 100
        publication:
          type: integer
          minimum: 0
          maximum: 100
        timeliness:
          type: integer
          minimum: 0
          maximum: 100

    IngestEntityInput:
      type: object
      required: [primaryName, entityType]
      properties:
        primaryName:
          type: string
        entityType:
          type: string
          enum: [person, organization, location, account, vessel, aircraft]
        aliases:
          type: array
          items:
            type: string
        description:
          type: string
        existingEntityId:
          type: string
          description: Existing entity ID for co-reference linking
        matchScore:
          type: number
          minimum: 0
          maximum: 1
          description: Jaro-Winkler similarity score if matched

    IngestFinancialTransactionInput:
      type: object
      required: [sourceEntity, destinationEntity, amount, currency, transactionDate]
      properties:
        sourceEntity:
          type: string
          description: Entity ID or name of the sender/payer
        destinationEntity:
          type: string
          description: Entity ID or name of the receiver/payee
        amount:
          type: integer
          description: Transaction amount in original currency
        currency:
          type: string
          enum: [USD, GBP, EUR, CHF, JPY, CAD, AUD, OTHER]
        transactionDate:
          type: string
          format: date-time
        instrument:
          type: string
          enum: [wire_transfer, check, cash, credit_card, crypto, trust_payment, shell_company, other]
        intermediaryEntity:
          type: string
        sourceAccount:
          type: string
        destinationAccount:
          type: string
        anomalyFlags:
          type: array
          items:
            type: string
            enum: [round_number, structuring, unusual_timing, new_counterparty, high_value, cross_border]
        notes:
          type: string

    IngestClaimInput:
      type: object
      required: [claimText, claimType, confidence]
      properties:
        claimText:
          type: string
          description: The specific factual assertion
        claimType:
          type: string
          enum: [factual, temporal, financial, testimonial, documentary, circumstantial, corroborative, contradictory]
        confidence:
          type: integer
          minimum: 0
          maximum: 100
        speakerId:
          type: string
        claimDate:
          type: string
          format: date-time
        assertionDate:
          type: string
          format: date-time
        promptScores:
          $ref: '#/components/schemas/PromptScoresInput'

    BatchIngestRequest:
      type: object
      required: [investigationId, extractionRunId, records, provenance]
      properties:
        investigationId:
          type: string
          description: Investigation this batch belongs to
        extractionRunId:
          type: string
          description: Docudactyl extraction run ID for the batch
        records:
          type: array
          items:
            $ref: '#/components/schemas/IngestEvidenceRequest'
        provenance:
          $ref: '#/components/schemas/Provenance'
        deduplicateByHash:
          type: boolean
          default: true
          description: Skip records that already exist by SHA-256 hash
        continueOnError:
          type: boolean
          default: true
          description: Continue on individual record failure

    IngestResult:
      type: object
      properties:
        success:
          type: boolean
        evidenceId:
          type: string
        journalSeq:
          type: integer
        entitiesProcessed:
          type: integer
        transactionsProcessed:
          type: integer
        claimsProcessed:
          type: integer
        errors:
          type: array
          items:
            $ref: '#/components/schemas/IngestError'

    BatchIngestResult:
      type: object
      properties:
        runId:
          type: string
        totalSubmitted:
          type: integer
        importedCount:
          type: integer
        skippedCount:
          type: integer
        failedCount:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/IngestResult'
        timing:
          $ref: '#/components/schemas/Timing'

    IngestProgress:
      type: object
      properties:
        runId:
          type: string
        phase:
          type: string
          enum: [validating, deduplicating, inserting_evidence, resolving_entities, inserting_transactions, inserting_claims, creating_relationships, complete, failed]
        progress:
          type: number
          minimum: 0
          maximum: 1
          description: Progress as a fraction (0.0 to 1.0)
        processedCount:
          type: integer
        totalCount:
          type: integer
        message:
          type: string
        currentRecord:
          type: string

    IngestError:
      type: object
      properties:
        recordIndex:
          type: integer
          description: Zero-based index of the failed record
        code:
          type: string
        message:
          type: string
        sha256Hash:
          type: string

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

security:
  - bearerAuth: []
  - apiKey: []
