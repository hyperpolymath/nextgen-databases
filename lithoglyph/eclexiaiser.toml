# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: PMPL-1.0-or-later

[project]
name = "lithoglyph"

[[functions]]
name = "encodeProvenance"
source = "core-zig/src/cbor.zig"
energy-budget-mj = 30.0
carbon-budget-mg = 6.0

[[functions]]
name = "crc32c"
source = "core-zig/src/blocks.zig"
energy-budget-mj = 10.0
carbon-budget-mg = 2.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
