              schema:
                $ref: "../json-schema/error.json"
        "408":
          description: Query timed out.
          content:
            application/json:
              schema:
                $ref: "../json-schema/error.json"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "../json-schema/error.json"
