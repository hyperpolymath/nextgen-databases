name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    uses: hyperpolymath/panic-attacker/.github/workflows/scan-and-report.yml@21fc3f00a088c954912936f4a68970621b82c2e6 # main
    secrets:
      VERISIMDB_PAT: ${{ secrets.VERISIMDB_PAT }}
